<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Rental System</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  .car {
    width: calc(10% - 20px);
    margin: 10px;
    float: left;
    border: 1px solid #ddd;
    border-radius: 5px;
    padding: 10px;
    box-sizing: border-box;
  }

  .car img {
    max-width: 100%;
    height: auto;
    border-radius: 5px;
  }

  .car-details {
    margin-top: 10px;
  }

  .car-details h3 {
    margin: 5px 0;
  }

  .car-details p {
    margin: 5px 0;
  }
</style>
</head>
<body>
<div class="container">
  <div class="car">
    <img src="car1.jpg" alt="Car 1">
    <div class="car-details">
      <h3>Car 1</h3>
      <p>Model: Model 1</p>
      <p>Price: $100/day</p>
      <button>Book Now</button>
    </div>
  </div>
  <div class="car">
    <img src="car2.jpg" alt="Car 2">
    <div class="car-details">
      <h3>Car 2</h3>
      <p>Model: Model 2</p>
      <p>Price: $120/day</p>
      <button>Book Now</button>
    </div>
  </div>
  <!-- Add more car elements here following the same structure -->
  <!-- Example: -->
  <!-- <div class="car">
    <img src="car3.jpg" alt="Car 3">
    <div class="car-details">
      <h3>Car 3</h3>
      <p>Model: Model 3</p>
      <p>Price: $110/day</p>
      <button>Book Now</button>
    </div>
  </div> -->
  <!-- Repeat this structure for each car -->
</div>
</body>
</html>
